# Local development database only — production runs managed Postgres.
# Usage: docker compose up -d
services:
  db:
    image: postgres:16
    container_name: betting-db
    environment:
      POSTGRES_USER: betting
      POSTGRES_PASSWORD: betting
      POSTGRES_DB: betting
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U betting -d betting"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
